name: Deploy to AWS App Runner

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (defaults to commit SHA)"
        required: false

# Required repository secrets:
#   AWS_ACCESS_KEY_ID        — IAM user key with ECR + App Runner permissions
#   AWS_SECRET_ACCESS_KEY    — IAM user secret
#   AWS_REGION               — e.g. us-east-1
#   AWS_ACCOUNT_ID           — 12-digit AWS account number
#   APP_NAME                 — Application name
#   APPRUNNER_ECR_ROLE_ARN   — IAM role ARN with AmazonEC2ContainerRegistryReadOnly

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_NAME: ${{ secrets.APP_NAME }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      IMAGE_TAG: ${{ inputs.image_tag || github.sha }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend
        run: |
          REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com"
          aws ecr describe-repositories --repository-names "$APP_NAME-backend" 2>/dev/null \
            || aws ecr create-repository --repository-name "$APP_NAME-backend" \
                 --image-scanning-configuration scanOnPush=true
          docker build --platform linux/amd64 \
            -t "$REGISTRY/$APP_NAME-backend:$IMAGE_TAG" \
            -t "$REGISTRY/$APP_NAME-backend:latest" \
            -f infra/Dockerfile.backend backend/
          docker push "$REGISTRY/$APP_NAME-backend:$IMAGE_TAG"
          docker push "$REGISTRY/$APP_NAME-backend:latest"

      - name: Build and push frontend
        run: |
          REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com"
          aws ecr describe-repositories --repository-names "$APP_NAME-frontend" 2>/dev/null \
            || aws ecr create-repository --repository-name "$APP_NAME-frontend" \
                 --image-scanning-configuration scanOnPush=true
          docker build --platform linux/amd64 \
            -t "$REGISTRY/$APP_NAME-frontend:$IMAGE_TAG" \
            -t "$REGISTRY/$APP_NAME-frontend:latest" \
            -f infra/Dockerfile.frontend frontend/
          docker push "$REGISTRY/$APP_NAME-frontend:$IMAGE_TAG"
          docker push "$REGISTRY/$APP_NAME-frontend:latest"

      - name: Deploy to App Runner
        run: bash deploy/aws/deploy.sh
        env:
          APPRUNNER_ECR_ROLE_ARN: ${{ secrets.APPRUNNER_ECR_ROLE_ARN }}
