services:
  backend:
    build:
      context: ../backend
      dockerfile: ./Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ../frontend
      dockerfile: ./Dockerfile.frontend
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    depends_on:
      backend:
        condition: service_healthy
